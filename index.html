<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우주 슈팅 게임 - 레이저 업데이트</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: radial-gradient(circle at center, #001133 0%, #000000 100%);
            border: 2px solid #333;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.2);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        #score-display { color: #00ffcc; }
        #health-display { color: #ff3366; }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .hidden { display: none !important; }

        h1 { font-size: 2.5rem; margin: 0; color: #fff; text-align: center; }
        button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        #mobile-controls {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 15px;
            justify-content: space-between;
        }

        @media (max-width: 768px) { #mobile-controls { display: flex; } }

        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); gap: 10px; }
        .d-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .action-btn { width: 70px; height: 70px; background: rgba(255, 50, 100, 0.4); border: 2px solid #ff3366; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div class="hud">
                <span id="score-display">Score: 0</span>
                <span id="health-display">HP: 100</span>
            </div>
        </div>

        <div id="overlay">
            <h1 id="game-title">GALACTIC DEFENDER</h1>
            <p id="game-message">레이저 적들의 위협을 피하고 생존하십시오.</p>
            <button id="start-btn">미션 시작</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="d-pad">
            <div class="d-btn" id="btn-up" style="grid-column: 2">↑</div>
            <div class="d-btn" id="btn-left" style="grid-column: 1; grid-row: 2">←</div>
            <div class="d-btn" id="btn-down" style="grid-column: 2; grid-row: 2">↓</div>
            <div class="d-btn" id="btn-right" style="grid-column: 3; grid-row: 2">→</div>
        </div>
        <div class="action-btn" id="btn-shoot">FIRE</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const scoreDisplay = document.getElementById('score-display');
        const healthDisplay = document.getElementById('health-display');
        const gameTitle = document.getElementById('game-title');

        let animationId;
        let isGameOver = false;
        let score = 0;
        let frameCount = 0;

        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Space: false };

        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let items = [];
        let particles = [];
        let stars = [];

        const player = {
            x: 0, y: 0, width: 34, height: 44, speed: 5, color: '#00ccff',
            health: 100, lastShotTime: 0, fireRate: 150,
            shield: 0, // 방어막 지속 시간
            powerups: { multiShot: 0, splash: 0 },
            
            init() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 100;
                this.health = 100;
                this.shield = 0;
                this.powerups = { multiShot: 0, splash: 0 };
            },

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 엔진 화염
                const flicker = Math.random() * 8 + 12;
                const gradient = ctx.createLinearGradient(0, 15, 0, 15 + flicker);
                gradient.addColorStop(0, '#ffaa00');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(-6, 18); ctx.lineTo(0, 18 + flicker); ctx.lineTo(6, 18);
                ctx.fill();

                // 기체 날개
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.moveTo(-18, 10); ctx.lineTo(18, 10); ctx.lineTo(0, -15); ctx.fill();

                // 기체 몸체
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, -22); ctx.lineTo(12, 5); ctx.lineTo(12, 18); ctx.lineTo(-12, 18); ctx.lineTo(-12, 5); ctx.closePath();
                ctx.fill();

                // 캐노피
                ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.5;
                ctx.beginPath(); ctx.ellipse(0, -2, 5, 8, 0, 0, Math.PI * 2); ctx.fill();

                // 방어막 효과
                if (this.shield > 0) {
                    ctx.globalAlpha = 0.4 + Math.sin(frameCount * 0.1) * 0.2;
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 35, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                    ctx.fill();
                }

                ctx.restore();
            },

            update() {
                if (keys.ArrowUp && this.y > 50) this.y -= this.speed;
                if (keys.ArrowDown && this.y < canvas.height - 50) this.y += this.speed;
                if (keys.ArrowLeft && this.x > 30) this.x -= this.speed;
                if (keys.ArrowRight && this.x < canvas.width - 30) this.x += this.speed;

                if (this.powerups.multiShot > 0) this.powerups.multiShot--;
                if (this.powerups.splash > 0) this.powerups.splash--;
                if (this.shield > 0) this.shield--;

                const now = Date.now();
                if (keys.Space && now - this.lastShotTime > this.fireRate) {
                    this.shoot();
                    this.lastShotTime = now;
                }
            },

            shoot() {
                const splash = this.powerups.splash > 0;
                const count = this.powerups.multiShot > 0 ? 3 : 1;
                for(let i = 0; i < count; i++) {
                    bullets.push({
                        x: this.x, y: this.y - 20, 
                        vx: count > 1 ? (i - 1) * 2 : 0, vy: -10, 
                        radius: splash ? 6 : 3, color: splash ? '#ff00ff' : '#ffff00',
                        isSplash: splash, damage: 25
                    });
                }
            },

            takeDamage(amt) {
                if (this.shield > 0) return; // 방어막 활성 시 무시
                this.health -= amt;
                createParticles(this.x, this.y, '#ff0000', 10);
                if (this.health <= 0) gameOver();
            }
        };

        function spawnEnemy() {
            const roll = Math.random();
            let enemy = { x: Math.random() * (canvas.width - 60) + 30, y: -50, id: Date.now() };
            
            if (roll < 0.3) { // 소행성
                Object.assign(enemy, { type: 'asteroid', health: 30, speed: 2, radius: 20, color: '#886644' });
            } else if (roll < 0.6) { // 레이저 크루저 (신규)
                Object.assign(enemy, { 
                    type: 'laser_cruiser', health: 80, speed: 1.2, radius: 25, color: '#ff0055',
                    laserState: 'none', // none, charging, firing
                    laserTimer: 0,
                    laserX: 0
                });
            } else if (roll < 0.85) { // 스트라이커
                Object.assign(enemy, { type: 'striker', health: 40, speed: 3.5, radius: 15, color: '#ffff00', burst: 0 });
            } else { // 헤비
                Object.assign(enemy, { type: 'heavy', health: 200, speed: 0.8, radius: 35, color: '#aa00ff' });
            }
            enemy.maxHealth = enemy.health;
            enemies.push(enemy);
        }

        function spawnItem() {
            const types = [
                { color: '#00ffff', label: 'MULTI', type: 'multi' },
                { color: '#ff00ff', label: 'SPLASH', type: 'splash' },
                { color: '#00ff00', label: 'REPAIR', type: 'heal' },
                { color: '#55aaff', label: 'SHIELD', type: 'shield' }
            ];
            const t = types[Math.floor(Math.random() * types.length)];
            items.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: -20, radius: 15, ...t, speed: 2
            });
        }

        function checkCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            return Math.sqrt(dx * dx + dy * dy) < (obj1.radius || 15) + (obj2.radius || 15);
        }

        function update() {
            if (isGameOver) return;
            frameCount++;

            const spawnInterval = Math.max(20, 60 - Math.floor(score / 800));
            if (frameCount % spawnInterval === 0) spawnEnemy();
            if (frameCount % 800 === 0) spawnItem();

            player.update();

            // 총알 처리
            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if (b.y < -50) bullets.splice(i, 1);
            });

            enemyBullets.forEach((eb, i) => {
                eb.y += eb.speed;
                if (checkCollision(player, eb)) {
                    player.takeDamage(10);
                    enemyBullets.splice(i, 1);
                }
                if (eb.y > canvas.height + 20) enemyBullets.splice(i, 1);
            });

            // 적 처리
            enemies.forEach((e, i) => {
                e.y += e.speed;
                
                // 레이저 적 인공지능
                if (e.type === 'laser_cruiser') {
                    if (e.laserState === 'none' && Math.random() < 0.01) {
                        e.laserState = 'charging';
                        e.laserTimer = 90; // 1.5초 충전
                        e.laserX = e.x;
                    }
                    
                    if (e.laserState === 'charging') {
                        e.laserTimer--;
                        if (e.laserTimer <= 0) {
                            e.laserState = 'firing';
                            e.laserTimer = 60; // 1초간 발사
                        }
                    } else if (e.laserState === 'firing') {
                        e.laserTimer--;
                        // 레이저 충돌 판정
                        if (Math.abs(player.x - e.laserX) < 25 && player.y > e.y) {
                            player.takeDamage(1); // 지속 대미지
                        }
                        if (e.laserTimer <= 0) e.laserState = 'none';
                    }
                }

                // 일반 공격
                if (frameCount % 100 === 0) {
                    if (e.type === 'striker') e.burst = 3;
                    if (e.type === 'heavy') enemyBullets.push({ x: e.x, y: e.y, speed: 4, radius: 12, color: '#aa00ff' });
                }
                if (e.burst > 0 && frameCount % 10 === 0) {
                    enemyBullets.push({ x: e.x, y: e.y, speed: 7, radius: 4, color: '#ffff00' });
                    e.burst--;
                }

                // 플레이어 공격 명중
                bullets.forEach((b, bi) => {
                    if (checkCollision(e, b)) {
                        e.health -= b.damage;
                        createParticles(b.x, b.y, b.color, 3);
                        bullets.splice(bi, 1);
                        if (e.health <= 0) {
                            score += 100;
                            createParticles(e.x, e.y, e.color, 15);
                            enemies.splice(i, 1);
                        }
                    }
                });

                if (checkCollision(player, e)) {
                    player.takeDamage(20);
                    enemies.splice(i, 1);
                }
                if (e.y > canvas.height + 100) enemies.splice(i, 1);
            });

            // 아이템 처리
            items.forEach((item, i) => {
                item.y += item.speed;
                if (checkCollision(player, item)) {
                    if (item.type === 'multi') player.powerups.multiShot = 600;
                    if (item.type === 'splash') player.powerups.splash = 600;
                    if (item.type === 'shield') player.shield = 400; // 약 6.6초
                    if (item.type === 'heal') player.health = Math.min(100, player.health + 30);
                    items.splice(i, 1);
                }
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            });

            scoreDisplay.innerText = `Score: ${score}`;
            healthDisplay.innerText = `HP: ${player.health}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 별
            stars.forEach(s => {
                s.y += s.speed; if (s.y > canvas.height) s.y = 0;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fill();
            });

            // 레이저 미리보기 및 발사
            enemies.forEach(e => {
                if (e.type === 'laser_cruiser') {
                    if (e.laserState === 'charging') {
                        ctx.strokeStyle = `rgba(255, 0, 0, ${0.2 + Math.sin(frameCount * 0.5) * 0.2})`;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath(); ctx.moveTo(e.laserX, e.y); ctx.lineTo(e.laserX, canvas.height); ctx.stroke();
                        ctx.setLineDash([]);
                    } else if (e.laserState === 'firing') {
                        const grad = ctx.createLinearGradient(e.laserX - 20, 0, e.laserX + 20, 0);
                        grad.addColorStop(0, 'transparent'); grad.addColorStop(0.5, '#ff0000'); grad.addColorStop(1, 'transparent');
                        ctx.fillStyle = grad;
                        ctx.fillRect(e.laserX - 15, e.y, 30, canvas.height);
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(e.laserX - 4, e.y, 8, canvas.height);
                    }
                }
            });

            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
            });

            enemyBullets.forEach(eb => {
                ctx.fillStyle = eb.color;
                ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.radius, 0, Math.PI*2); ctx.fill();
            });

            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.fillStyle = e.color;
                if (e.type === 'asteroid') {
                    ctx.beginPath(); for(let i=0; i<8; i++) {
                        const a = i/8*Math.PI*2; const r = e.radius * (0.8 + Math.random()*0.2);
                        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                    } ctx.fill();
                } else if (e.type === 'laser_cruiser') {
                    ctx.beginPath(); ctx.moveTo(0, -e.radius); ctx.lineTo(e.radius, e.radius); ctx.lineTo(0, e.radius/2); ctx.lineTo(-e.radius, e.radius); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.fillRect(-5, -e.radius/2, 10, 5); // 렌즈
                } else {
                    ctx.rotate(Math.PI);
                    ctx.beginPath(); ctx.moveTo(0, -e.radius); ctx.lineTo(e.radius, e.radius); ctx.lineTo(-e.radius, e.radius); ctx.fill();
                }
                ctx.restore();
                if (e.health < e.maxHealth) {
                    ctx.fillStyle = 'red'; ctx.fillRect(e.x-20, e.y-e.radius-10, 40, 4);
                    ctx.fillStyle = 'lime'; ctx.fillRect(e.x-20, e.y-e.radius-10, 40 * (e.health/e.maxHealth), 4);
                }
            });

            items.forEach(item => {
                ctx.fillStyle = item.color;
                ctx.beginPath(); ctx.arc(item.x, item.y, item.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = '9px bold Arial'; ctx.textAlign = 'center'; ctx.fillText(item.label, item.x, item.y+3);
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            if (!isGameOver) player.draw();
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y, color, radius: Math.random() * 3,
                    vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                    life: 1.0, decay: Math.random() * 0.03 + 0.02
                });
            }
        }

        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5, speed: Math.random() * 2 + 0.5, alpha: Math.random()
                });
            }
        }

        function initGame() {
            player.init();
            score = 0; frameCount = 0;
            bullets = []; enemyBullets = []; enemies = []; items = []; particles = [];
            isGameOver = false;
            overlay.classList.add('hidden');
            initStars();
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            gameTitle.innerText = "MISSION FAILED";
            startBtn.innerText = "다시 시도";
            overlay.classList.remove('hidden');
        }

        startBtn.addEventListener('click', initGame);
        window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        // 터치 제어
        const touchMap = { 'btn-up': 'ArrowUp', 'btn-down': 'ArrowDown', 'btn-left': 'ArrowLeft', 'btn-right': 'ArrowRight', 'btn-shoot': 'Space' };
        Object.entries(touchMap).forEach(([id, key]) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        });

        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            initStars();
        }
        window.addEventListener('resize', resize);
        resize();

    </script>
</body>
</html>
